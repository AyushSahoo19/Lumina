<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Editorial Dashboard</title>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effect"></div>
    
    <div class="split-layout">
        <!-- Editorial Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="top-nav-links">
                    <a href="index.html" class="nav-item" title="Home">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                        <span class="nav-text">Home</span>
                    </a>
                    <a href="journal.html" class="nav-item" title="Journal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"></path><path d="M8 7h6"></path><path d="M8 11h8"></path></svg>
                        <span class="nav-text">Journal</span>
                    </a>
                    <a href="about.html" class="nav-item" title="About">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                        <span class="nav-text">About</span>
                    </a>
                    <a href="connect.html" class="nav-item" title="Connect">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                        <span class="nav-text">Connect</span>
                    </a>
                </div>

                <div class="brand-section">
                    <h1 class="brand-name">Lumina</h1>
                    <span class="brand-symbol">✧</span>
                </div>
                
                <div class="hero-content">
                    <div class="hero-badge">Curated Discovery</div>
                    <p class="hero-subtitle">Your minimal digital workspace for seamless exploration.</p>
                </div>

                <nav class="filter-bar" id="filter-bar">
                    <!-- Buttons dynamically populated -->
                </nav>
            </div>

            <div class="sidebar-bottom">
                <p class="copyright">© 2026 Lumina. Built for Ayush.</p>
            </div>
        </aside>

        <!-- Main Card Grid Area -->
        <main class="main-content">
            <nav id="sub-filter-bar" class="sub-filter-bar" style="display: none;"></nav>
            <div class="bento-grid" id="links-container">
                <!-- Link cards rendered dynamically here -->
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
